<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no"
    />
    <meta name="color-scheme" content="dark" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Pomodoro" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="description" content="A minimal fullscreen timer." />

    <title>Pomodoro</title>

    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />
    <link rel="apple-touch-icon" href="icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <main class="stage" role="application" aria-label="Pomodoro">
      <svg class="border" aria-hidden="true" preserveAspectRatio="none">
        <path class="border-track" />
        <path class="border-fill" />
      </svg>

      <section class="center" aria-live="off">
        <div class="timer-wrap" id="timer-wrap">
          <div class="time" id="time" aria-hidden="true">
            <div class="digit"><span class="digit-val" data-pos="m10">0</span></div>
            <div class="digit"><span class="digit-val" data-pos="m1">0</span></div>
            <span class="time-colon">:</span>
            <div class="digit"><span class="digit-val" data-pos="s10">0</span></div>
            <div class="digit"><span class="digit-val" data-pos="s1">0</span></div>
          </div>
          <p class="pause-hint" id="pause-hint">
            <span class="pause-hint-touch">Tap to pause</span>
            <span class="pause-hint-keyboard">
              Press <kbd class="kbd">Space</kbd> to pause
            </span>
          </p>
        </div>
      </section>

      <aside class="timeline" aria-hidden="true">
        <div class="timeline-stack">
          <span class="timeline-label is-hint" id="tlabel">
            <span class="hint-line">Scroll to</span>
            <span class="hint-line">start</span>
          </span>
          <div class="timeline-wheel">
            <div class="timeline-track" id="track"></div>
          </div>
        </div>
      </aside>

      <p class="sr-only" id="sr-time" aria-live="polite" aria-atomic="true">Idle</p>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
